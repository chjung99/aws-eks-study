apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: nginx-ingress-tgb
  namespace: ingress-nginx # ingress-nginx 서비스가 있는 네임스페이스
spec:
  # 이미지에서 확인된 사용자님의 타겟 그룹 ARN입니다.
  targetGroupARN: arn:aws:elasticloadbalancing:ap-northeast-2:985984781526:targetgroup/11624-test-nlb-tg/e97eb8ca9a6298f2
  
  targetType: instance # NLB -> NodePort 방식이므로 instance 타입을 사용합니다.
  
  serviceRef:
    name: nginx-ingress-ingress-nginx-controller # 연결할 서비스 이름
    port: 80 # 서비스의 포트 (32131이 아니라 서비스 정의상의 포트 80을 적습니다)