apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-mode-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ip-mode-app
  template:
    metadata:
      labels:
        app: ip-mode-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ip-mode-service
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP # 로드밸런서가 파드 IP로 직접 쏘기 때문에 NodePort가 필요 없습니다.
  selector:
    app: ip-mode-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ip-mode-ingress
  annotations:
    # ALB 생성을 위한 설정
    alb.ingress.kubernetes.io/scheme: internet-facing
    # 핵심: 로드밸런서가 노드를 거치지 않고 파드 IP로 직접 전달하도록 설정
    alb.ingress.kubernetes.io/target-type: ip
    # 사용할 로드밸런서 그룹 (선택사항)
    alb.ingress.kubernetes.io/group.name: test-group
spec:
  ingressClassName: alb # AWS Load Balancer Controller가 이 리소스를 처리하게 함
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ip-mode-service
                port:
                  number: 80