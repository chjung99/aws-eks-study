apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-health-check
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80          # 서비스의 내부 포트
      targetPort: 80    # Pod 내부의 포트
      nodePort: 30080   # 중요: NLB 대상 그룹이 바라볼 '실제 노드 포트'